# pre-commit：git commit 前自动跑检查，失败则拒绝提交
# 与 Claude Code Hook 互补：Hook 编辑后触发，pre-commit 提交前触发
#
# 安装：
#   pip install pre-commit
#   pre-commit install   # 装 git hook
#
# 手动跑：
#   pre-commit run --all-files

repos:
  # ── 通用检查（不需要 Python 环境）──────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace    # 删除行尾空格
      - id: end-of-file-fixer      # 文件末尾加换行
      - id: check-yaml             # YAML 语法检查
      - id: check-json             # JSON 语法检查
      - id: check-merge-conflict   # 检查合并冲突标记
      - id: check-added-large-files
        args: [--maxkb=500]        # 阻止提交大文件（>500KB）
      - id: detect-private-key     # 阻止提交私钥

  # ── Python 代码风格 ────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=120
          - --extend-ignore=E501,W503
          - --exclude=env,alembic/versions

  # ── Python 类型检查 ────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--config-file=mypy.ini]
        additional_dependencies:
          - pydantic>=2.0
          - sqlalchemy>=2.0
        exclude: ^env/|^alembic/versions/

  # ── 项目自定义检查（AST 校验，复用 Claude Hook 脚本）─
  - repo: local
    hooks:
      - id: project-ast-check
        name: 项目 AST 规范检查
        entry: python scripts/check.py
        language: system
        files: \.py$
        pass_filenames: false
