# Docker Compose: app + mysql 一键启动
# 用法：
#   docker compose up -d --build    # 构建并启动
#   docker compose logs -f app      # 看日志
#   docker compose exec app alembic upgrade head  # 执行迁移
#   docker compose down             # 停止
#   docker compose down -v          # 停止并删数据卷（慎用）

services:
  # ── MySQL 数据库 ──────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: user-demo-mysql
    restart: unless-stopped
    environment:
      # 使用 :? 强制要求设置 DB_PASSWORD，避免弱默认密码上生产
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      MYSQL_DATABASE: ${DB_NAME:-testdb}
      # 默认时区
      TZ: Asia/Shanghai
    ports:
      # 宿主机 3306 -> 容器 3306
      # 如果本地已装 MySQL 冲突，改成 "3307:3306"
      - "3306:3306"
    volumes:
      # 数据持久化：mysql_data 卷
      - mysql_data:/var/lib/mysql
      # 启动时自动建表（可选，应用层也会建）
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:?DB_PASSWORD must be set}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # 不暴露给宿主机之外（仅 app 服务可通过 service name 'mysql' 访问）

  # ── FastAPI 应用 ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-demo-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy  # 等 mysql 健康后再启动
    environment:
      # 数据库连接：host 用 service name 'mysql'
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      # DB_PASSWORD 同样强制要求，不在 compose 里给弱默认
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      DB_NAME: ${DB_NAME:-testdb}
      # 应用环境：development / staging / production
      # production 下应用会关闭 /docs、/redoc、/openapi.json
      APP_ENV: ${APP_ENV:-development}
      # JWT 签名密钥：生产必须设为强随机值，强制要求显式提供
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      # Access Token 过期时间（分钟）
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      # 日志级别
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Python 缓冲关闭，日志实时输出
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    # 启动前先等 MySQL 完全就绪并执行迁移，再启动 gunicorn
    command: >
      sh -c "
        echo '⏳ 等待 MySQL 就绪...' &&
        python -c 'import time, pymysql; \
          from os import environ; \
          [time.sleep(2) for _ in range(30) if (lambda: (lambda c: (c.close() or True))(pymysql.connect(host=environ[\"DB_HOST\"], user=environ[\"DB_USER\"], password=environ[\"DB_PASSWORD\"], database=environ[\"DB_NAME\"]))() )() is False]' 2>/dev/null || true &&
        echo '✅ MySQL 就绪' &&
        alembic upgrade head &&
        echo '✅ 数据库迁移完成' &&
        gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --access-logfile - --error-logfile -
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

# 数据卷
volumes:
  mysql_data:
    driver: local
