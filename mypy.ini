# mypy 配置：静态类型检查
# 用法：mypy app/ main.py --config-file mypy.ini
# 或：make typecheck

[mypy]
# Python 版本（决定可用语法，影响 X | None 等）
python_version = 3.9

# 严格模式（生产推荐）
strict = True

# 检查未注解的函数
check_untyped_defs = True

# 警告未使用的 import（可关掉，flake8 也检查）
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True

# 不忽略错误（必须显式 # type: ignore）
ignore_errors = False

# 排除目录
exclude = (?x)(
    ^env/
    | ^build/
    | ^dist/
    | ^alembic/versions/   # 自动生成的迁移脚本类型不严格
  )

# 第三方库无类型存根时降级处理
[mypy-pymysql.*]
ignore_missing_imports = True

[mypy-bcrypt.*]
ignore_missing_imports = True

[mypy-jwt.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True

# 测试代码放宽
[mypy-tests.*]
strict = False
disallow_untyped_defs = False
