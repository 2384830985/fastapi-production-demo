# pytest 配置
[pytest]
# 测试文件位置
testpaths = tests

# 测试文件命名模式
python_files = test_*.py

# 测试函数命名模式
python_functions = test_*

# 测试类命名模式
python_classes = Test*

# 命令行选项
addopts =
    -v
    --strict-markers
    --tb=short
    --showlocals
    --color=yes

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
